<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Easy Scrap Zenn</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container">
      <h1>Scrap 追記メモ作成</h1>

      <section class="card">
        <label class="label" for="scrapUrl">Zenn Scrap URL</label>
        <input id="scrapUrl" type="url" placeholder="https://zenn.dev/{user}/scraps/{id}">
        <button id="saveScrapUrl" type="button">Scrap URL を保存</button>
        <p id="saveStatus" class="hint"></p>
      </section>

      <section class="card">
        <h2>ページ情報</h2>
        <p><strong>Title:</strong> <span id="pageTitle"></span></p>
        <p><strong>URL:</strong> <a id="pageUrl" href="#" target="_blank" rel="noopener noreferrer"></a></p>
      </section>

      <section class="card">
        <label class="label" for="selectedText">選択テキスト（任意）</label>
        <textarea id="selectedText" rows="4"></textarea>
      </section>

      <section class="card">
        <label class="label" for="comment">コメント（任意）</label>
        <textarea id="comment" rows="6" placeholder="このページについてメモ"></textarea>
      </section>

      <section class="card">
        <h2>追記テキスト（コピー用）</h2>
        <textarea id="payload" rows="12" readonly></textarea>
      </section>

      <section class="actions">
        <button id="copyPayload" type="button">追記テキストをコピー</button>
        <button id="openScrap" type="button">Scrap を開く（コピーも実行）</button>
        <button id="openOptions" type="button">オプションを開く</button>
      </section>

      <p class="hint">
        ショートカットは <code>chrome://extensions/shortcuts</code> で変更できます。<br>
        ブラウザ予約ショートカット（例: Ctrl+T）は使えない場合があります。
      </p>
    </main>

    <script src="compose.js"></script>
  </body>
</html>
